services:
  postgres:
    image: postgres:16-alpine
    container_name: novari-postgres
    ports:
      - '5433:5432'
    # Credentials are read from Novari/.env (copy .env.example to .env first).
    # Docker Compose auto-loads .env in this directory for ${VAR} substitution.
    environment:
      POSTGRES_DB: ${DB_NAME:-novari_db}
      POSTGRES_USER: ${DB_USER:-novari_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - novari_pg_data:/var/lib/postgresql/data

volumes:
  novari_pg_data:
